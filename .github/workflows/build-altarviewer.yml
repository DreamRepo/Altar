name: Build AltarViewer

on:
  push:
    branches:
      - main
    tags:
      - 'altarviewer-v*'
    paths:
      - 'AltarViewer/**'
      - '.github/workflows/build-altarviewer.yml'
  pull_request:
    branches:
      - main
    paths:
      - 'AltarViewer/**'
  workflow_dispatch:

permissions:
  contents: write

defaults:
  run:
    working-directory: AltarViewer

jobs:
  build-windows:
    runs-on: windows-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller
    
    - name: Build executable
      run: |
        pyinstaller AltarViewer.spec
    
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: AltarViewer-Windows
        path: AltarViewer/dist/AltarViewer.exe

  build-macos:
    runs-on: macos-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install Tk dependencies
      run: |
        brew install python-tk@3.11 || true
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller
    
    - name: Build executable
      run: |
        pyinstaller AltarViewer.spec
    
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: AltarViewer-macOS
        path: AltarViewer/dist/AltarViewer

  build-linux:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y python3-tk
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller
    
    - name: Build executable
      run: |
        pyinstaller AltarViewer.spec
    
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: AltarViewer-Linux
        path: AltarViewer/dist/AltarViewer

  release:
    if: startsWith(github.ref, 'refs/tags/altarviewer-v')
    needs: [build-windows, build-macos, build-linux]
    runs-on: ubuntu-latest
    
    steps:
    - name: Download Windows artifact
      uses: actions/download-artifact@v4
      with:
        name: AltarViewer-Windows
        path: ./windows
    
    - name: Download macOS artifact
      uses: actions/download-artifact@v4
      with:
        name: AltarViewer-macOS
        path: ./macos
    
    - name: Download Linux artifact
      uses: actions/download-artifact@v4
      with:
        name: AltarViewer-Linux
        path: ./linux
    
    - name: Rename artifacts
      run: |
        mv ./macos/AltarViewer ./macos/AltarViewer-macOS
        mv ./linux/AltarViewer ./linux/AltarViewer-Linux
      working-directory: .
    
    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        files: |
          ./windows/AltarViewer.exe
          ./macos/AltarViewer-macOS
          ./linux/AltarViewer-Linux
        draft: true
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
